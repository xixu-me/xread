version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    open-pull-requests-limit: 10
    rebase-strategy: auto
    ignore:
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      - dependency-name: "@koa/bodyparser"
        update-types:
          - version-update:semver-major
      - dependency-name: htmlparser2
        update-types:
          - version-update:semver-major
      - dependency-name: koa
        update-types:
          - version-update:semver-major
      - dependency-name: maxmind
        update-types:
          - version-update:semver-major
      - dependency-name: pdfjs-dist
        update-types:
          - version-update:semver-major
      - dependency-name: puppeteer
        update-types:
          - version-update:semver-major
      - dependency-name: set-cookie-parser
        update-types:
          - version-update:semver-major
      - dependency-name: simple-zstd
        update-types:
          - version-update:semver-major
      - dependency-name: stripe
        update-types:
          - version-update:semver-major
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - major
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Shanghai
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
