name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify stand-alone build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      PUPPETEER_SKIP_DOWNLOAD: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Enforce dependency security policy
        run: bun run security:audit

      - name: Lint source files
        run: bun run lint

      - name: Run repository tests
        run: bun run test:ci

      - name: Build TypeScript output
        run: bun run build

      - name: Smoke-test stand-alone entrypoints
        run: |
          NODE_ENV=dry-run bun ./build/stand-alone/crawl.js
          NODE_ENV=dry-run bun ./build/stand-alone/search.js
          NODE_ENV=dry-run bun ./build/stand-alone/serp.js

  validate-container:
    name: Validate container build
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Prepare licensed assets
        run: bun ./scripts/prepare-licensed-assets.cjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container image without publishing
        uses: docker/build-push-action@b66d8774c665b789105b440514f0c97e6f19b06f
        with:
          context: .
          push: false
